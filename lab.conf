#!/usr/bin/env bash

# Main lab settings
LAB_NAME="mitm-lab"
LIBVIRT_URI="qemu:///system"
OS_VARIANT="ubuntu24.04"

# Storage
STORAGE_POOL_NAME="mitm-lab-pool"
STORAGE_ROOT="/home/lutyk/Desktop/mad-mitm-in-lan/storage"
BASE_IMAGE_NAME="noble-server-cloudimg-amd64.img"
BASE_IMAGE_URL="https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img"
BASE_IMAGE_PATH="${STORAGE_ROOT}/${BASE_IMAGE_NAME}"

# Guest names
GATEWAY_NAME="mitm-gateway"
VICTIM_NAME="mitm-victim"
ATTACKER_NAME="mitm-attacker"

# Guest resources
GATEWAY_VCPUS="2"
VICTIM_VCPUS="2"
ATTACKER_VCPUS="2"
GATEWAY_RAM_MB="2048"
VICTIM_RAM_MB="2048"
ATTACKER_RAM_MB="2048"
GATEWAY_DISK_SIZE="20G"
VICTIM_DISK_SIZE="20G"
ATTACKER_DISK_SIZE="20G"

# Guest access
LAB_USER="lab"
LAB_PASSWORD="change-me-lab"
TIMEZONE="UTC"

# Network plan
LAB_SUBNET="10.20.20.0/24"
LAB_SWITCH_BRIDGE="br-mitm-lab"
LAB_SWITCH_MIRROR="mitm-lab-mirror"
LAB_SWITCH_SENSOR_PORT="mitm-sensor0"
# monitor: count DHCP server replies from non-gateway switch ports and forward them.
# enforce: drop those replies at OVS. off: remove the extra OVS flows.
LAB_DHCP_SNOOPING_MODE="monitor"
# Backward-compatible override: set to 1 to force enforce mode.
LAB_DHCP_SNOOPING_ENFORCE="0"
# Count ARP and DNS trust violations at OVS for compact ground truth.
LAB_SWITCH_TRUTH_SNOOPING="1"
LAB_DHCP_RANGE_START="10.20.20.100"
LAB_DHCP_RANGE_END="10.20.20.199"
GATEWAY_IP="10.20.20.1"
GATEWAY_CIDR="10.20.20.1/24"
# Legacy placeholder addresses kept only for backward-compatible render paths.
# Runtime victim/attacker IPs should come from DHCP leases, switch capture, or attacker discovery.
VICTIM_CIDR="10.20.20.10/24"
ATTACKER_CIDR="10.20.20.66/24"
DNS_SERVER="10.20.20.1"
UPSTREAM_DNS1="1.1.1.1"
UPSTREAM_DNS2="8.8.8.8"
DETECTOR_DOMAINS="example.com example.org iana.org"

# Host-side experiment captures. The aggregate mirror remains pcap/sensor.pcap;
# these per-port captures preserve the gateway/victim/attacker switch views.
# PORT_PCAP_ENABLE="1"
# PORT_PCAP_ROLES="gateway victim attacker"

# Fixed MACs to make cloud-init interface matching stable
GATEWAY_UP_MAC="52:54:00:aa:10:01"
GATEWAY_LAB_MAC="52:54:00:aa:20:01"
VICTIM_MAC="52:54:00:aa:20:10"
ATTACKER_MAC="52:54:00:aa:20:66"
